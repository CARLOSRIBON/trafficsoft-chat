server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Seguridad: iframe (INICIALMENTE ABIERTO) ───
    # Para restringir solo a validacion.trafficsoft.co, cambiar a:
    #   add_header Content-Security-Policy "frame-ancestors https://validacion.trafficsoft.co" always;
    #   add_header X-Frame-Options "ALLOW-FROM https://validacion.trafficsoft.co" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    # ─── Seguridad: prevenir acceso directo (INICIALMENTE ABIERTO) ───
    # Para activar, descomentar el bloque:
    # set $deny_direct 1;
    # if ($http_referer ~* "validacion\.trafficsoft\.co") { set $deny_direct 0; }
    # if ($http_sec_fetch_dest = "iframe") { set $deny_direct 0; }
    # if ($deny_direct) { return 403; }

    # Headers de seguridad generales
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Proxy API → analytics-service ───
    location /chat/api/ {
        proxy_pass http://analytics-service.analytics-service.svc.cluster.local:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pasar el header X-User-ID del cliente
        proxy_pass_request_headers on;

        # Timeouts para queries largas
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── SPA: servir archivos estaticos ───
    location /chat/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /chat/index.html;
    }

    # ─── Health check para K8s ───
    location /chat/health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
